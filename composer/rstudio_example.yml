name: ${COMPOSE_PROJECT_NAME}

services:
  rstudio-server:
    image: dncr/rstudio-server:${R_VERSION}-${UBUNTU_VERSION}
    container_name: ${CONTAINER_NAME}
    env_file:
      - .env
    environment:
      DEFAULT_USER: ${DEFAULT_USER}
      PASSWORD: ${PASSWORD:?Set PASSWORD in composer/.env before running docker compose}
      ROOT: ${ROOT:-false}
      USERID: ${USERID:-1000}
      GROUPID: ${GROUPID:-1000}
      DISABLE_AUTH: ${DISABLE_AUTH:-false}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${PORT:-8002}:8787
      - ${BIND_ADDRESS:-127.0.0.1}:${SSH_PORT:-2222}:22
    volumes:
      - type: bind
        source: ${WORKDIR:-./workspace}
        target: ${CONTAINER_HOME:-/home/rstudio}/externalvolume
      - type: bind
        source: ${SSH_PUBLIC_KEY}
        target: ${CONTAINER_HOME:-/home/rstudio}/.ssh/authorized_keys
        read_only: true
        bind:
          create_host_path: false
