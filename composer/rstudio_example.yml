name: ${COMPOSE_PROJECT_NAME}

services:
  rstudio-server:
    image: ${RSTUDIO_IMAGE_REPO:-dncr/rstudio-server}:${R_VERSION}-${UBUNTU_VERSION}
    container_name: ${CONTAINER_NAME}
    environment:
      DEFAULT_USER: ${DEFAULT_USER:-rstudio}
      PASSWORD: ${PASSWORD:?Set PASSWORD in composer/.env before running docker compose}
      ROOT: ${ROOT:-false}
      USERID: ${USERID:-1000}
      GROUPID: ${GROUPID:-1000}
      DISABLE_AUTH: ${DISABLE_AUTH:-false}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:${PORT:-8002}:8787
      - ${BIND_ADDRESS:-127.0.0.1}:${SSH_PORT:-2222}:22
    volumes:
      - type: bind
        source: ${WORKDIR:-./workspace}
        target: /home/${DEFAULT_USER:-rstudio}/externalvolume
      - type: bind
        source: ${SSH_PUBLIC_KEY}
        target: /home/${DEFAULT_USER:-rstudio}/.ssh/authorized_keys
        read_only: true
        bind:
          create_host_path: false
